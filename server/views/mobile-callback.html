<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to App...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .status {
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        textarea {
            width: 100%;
            padding: 15px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin: 20px 0;
            min-height: 120px;
            resize: vertical;
            background: #f8f9fa;
        }
        .button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin: 8px;
            min-width: 150px;
            transition: all 0.3s;
        }
        .button:hover { background: #1976D2; transform: translateY(-2px); }
        .button:active { transform: translateY(0); }
        .button.green { background: #4CAF50; }
        .button.green:hover { background: #45a049; }
        .instructions {
            margin-top: 20px;
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Authentication</h1>
        <div id="status" class="status">Loading...</div>
        <textarea id="tokenDisplay" readonly placeholder="Token will appear here..."></textarea>
        <div>
            <button class="button" onclick="openApp()">Open App</button>
            <button class="button green" onclick="copyToken()">Copy Token</button>
        </div>
        <div class="instructions">
            <p><strong>Instructions:</strong></p>
            <p>1. The app should open automatically</p>
            <p>2. If not, click "Open App" button</p>
            <p>3. Or copy the token and paste it in the app</p>
        </div>
    </div>

    <script>
        // Token injected by server - check immediately
        console.log('=== TOKEN EXTRACTION START ===');
        console.log('window.serverToken:', window.serverToken ? 'EXISTS (length: ' + window.serverToken.length + ')' : 'NOT FOUND');
        console.log('window.serverPendingToken:', window.serverPendingToken ? 'EXISTS' : 'NOT FOUND');
        console.log('window.serverError:', window.serverError || 'NOT FOUND');
        console.log('window.location.search:', window.location.search);
        
        var token = window.serverToken || null;
        var pendingToken = window.serverPendingToken || null;
        var error = window.serverError || null;
        
        // Also try to extract from URL as fallback
        if (!token && !pendingToken && !error) {
            console.log('No server-injected token, trying URL extraction...');
            var search = window.location.search;
            if (search) {
                var params = new URLSearchParams(search);
                token = params.get('token');
                pendingToken = params.get('pendingToken');
                error = params.get('error');
                console.log('URL extraction result:', { token: !!token, pendingToken: !!pendingToken, error: error });
            }
        }
        
        console.log('Final token status:', { token: !!token, pendingToken: !!pendingToken, error: error });
        
        function displayToken() {
            var tokenDisplay = document.getElementById('tokenDisplay');
            var status = document.getElementById('status');
            
            if (!tokenDisplay || !status) {
                setTimeout(displayToken, 50);
                return;
            }
            
            if (token) {
                tokenDisplay.value = token;
                status.textContent = '✅ Token loaded! Opening app...';
                status.className = 'status success';
                window.currentToken = token;
                
                // Auto-open app after 500ms
                setTimeout(function() {
                    var deepLink = 'mafqoudat://auth/callback?token=' + encodeURIComponent(token);
                    window.location.href = deepLink;
                }, 500);
            } else if (pendingToken) {
                tokenDisplay.value = pendingToken;
                status.textContent = '✅ Pending token loaded!';
                status.className = 'status success';
                window.currentToken = pendingToken;
                
                setTimeout(function() {
                    var deepLink = 'mafqoudat://auth/callback?pendingToken=' + encodeURIComponent(pendingToken);
                    window.location.href = deepLink;
                }, 500);
            } else if (error) {
                tokenDisplay.value = 'ERROR: ' + error;
                status.textContent = '❌ Error: ' + error;
                status.className = 'status error';
            } else {
                tokenDisplay.value = 'ERROR: No token found!\n\nURL: ' + window.location.href;
                status.textContent = '❌ No token found';
                status.className = 'status error';
            }
        }
        
        function openApp() {
            var token = window.currentToken || document.getElementById('tokenDisplay').value;
            if (!token || token.includes('ERROR')) {
                alert('No token available');
                return;
            }
            
            var deepLink = 'mafqoudat://auth/callback?';
            if (window.currentToken === token && token.includes('.')) {
                // It's a JWT token
                deepLink += 'token=' + encodeURIComponent(token);
            } else if (pendingToken) {
                deepLink += 'pendingToken=' + encodeURIComponent(token);
            } else {
                deepLink += 'token=' + encodeURIComponent(token);
            }
            
            window.location.href = deepLink;
        }
        
        function copyToken() {
            var tokenDisplay = document.getElementById('tokenDisplay');
            var token = tokenDisplay.value;
            
            if (!token || token.includes('ERROR')) {
                alert('No token to copy');
                return;
            }
            
            tokenDisplay.select();
            tokenDisplay.setSelectionRange(0, token.length);
            
            try {
                if (document.execCommand('copy')) {
                    alert('✅ Token copied! Return to the app and paste it.');
                    return;
                }
            } catch(e) {}
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(token).then(function() {
                    alert('✅ Token copied!');
                }).catch(function() {
                    alert('Please manually select and copy the token.');
                });
            } else {
                alert('Please manually select and copy the token.');
            }
        }
        
        // Run immediately
        displayToken();
        
        // Also run when DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', displayToken);
        }
    </script>
</body>
</html>
