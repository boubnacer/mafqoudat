<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to App...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            max-width: 90%;
            width: 100%;
        }
        .button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            display: inline-block;
            min-width: 200px;
        }
        .button.green {
            background-color: #4CAF50;
        }
        textarea {
            width: 100%;
            padding: 15px;
            font-size: 12px;
            font-family: monospace;
            border: 2px solid #2196F3;
            border-radius: 4px;
            margin: 20px 0;
            min-height: 100px;
            box-sizing: border-box;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-size: 14px;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Authentication Token</h2>
        <div id="status" class="status">Extracting token...</div>
        <textarea id="tokenDisplay" readonly></textarea>
        <div>
            <button class="button" onclick="openApp()">Open App</button>
            <button class="button green" onclick="copyToken()">Copy Token</button>
        </div>
        <p style="margin-top: 20px; color: #666; font-size: 14px;">
            If the app doesn't open automatically, copy the token above and paste it in the app.
        </p>
    </div>

    <script>
        // SIMPLE, DIRECT TOKEN EXTRACTION - NO COMPLEXITY
        (function() {
            var search = window.location.search;
            var token = null;
            var pendingToken = null;
            
            // Extract token from URL - SIMPLE METHOD
            if (search) {
                // Method 1: Simple regex
                var match = search.match(/[?&]token=([^&]*)/);
                if (match && match[1]) {
                    token = decodeURIComponent(match[1]);
                }
                
                // Method 2: URLSearchParams (if regex didn't work)
                if (!token) {
                    try {
                        var params = new URLSearchParams(search);
                        token = params.get('token');
                        pendingToken = params.get('pendingToken');
                    } catch(e) {
                        console.error('URLSearchParams failed:', e);
                    }
                }
            }
            
            // Display token immediately
            var tokenDisplay = document.getElementById('tokenDisplay');
            var status = document.getElementById('status');
            
            if (token) {
                tokenDisplay.value = token;
                status.textContent = '✅ Token loaded successfully!';
                status.className = 'status success';
                
                // Try to open app automatically
                var deepLink = 'mafqoudat://auth/callback?token=' + encodeURIComponent(token);
                setTimeout(function() {
                    window.location.href = deepLink;
                }, 500);
            } else if (pendingToken) {
                tokenDisplay.value = pendingToken;
                status.textContent = '✅ Pending token loaded!';
                status.className = 'status success';
            } else {
                tokenDisplay.value = 'ERROR: No token found in URL.\n\nURL: ' + window.location.href;
                status.textContent = '❌ No token found in URL';
                status.className = 'status error';
            }
            
            // Store globally for copy function
            window.currentToken = token || pendingToken;
        })();
        
        function openApp() {
            var token = window.currentToken || document.getElementById('tokenDisplay').value;
            if (token && !token.includes('ERROR')) {
                var deepLink = 'mafqoudat://auth/callback?token=' + encodeURIComponent(token);
                window.location.href = deepLink;
            } else {
                alert('No token available to open app.');
            }
        }
        
        function copyToken() {
            var tokenDisplay = document.getElementById('tokenDisplay');
            var token = tokenDisplay.value;
            
            if (!token || token.includes('ERROR')) {
                alert('No token available to copy.');
                return;
            }
            
            // Select and copy
            tokenDisplay.select();
            tokenDisplay.setSelectionRange(0, token.length);
            
            try {
                if (document.execCommand('copy')) {
                    alert('Token copied! Return to the app and paste it.');
                    return;
                }
            } catch(e) {
                console.error('execCommand failed:', e);
            }
            
            // Fallback: try clipboard API
            if (navigator.clipboard) {
                navigator.clipboard.writeText(token).then(function() {
                    alert('Token copied! Return to the app and paste it.');
                }).catch(function() {
                    alert('Auto-copy failed. Please manually select and copy the token.');
                });
            } else {
                alert('Auto-copy not available. Please manually select and copy the token.');
            }
        }
    </script>
</body>
</html>
