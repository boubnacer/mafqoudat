<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to App...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            max-width: 90%;
            width: 100%;
        }
        .button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            display: inline-block;
            min-width: 200px;
        }
        .button.green {
            background-color: #4CAF50;
        }
        textarea {
            width: 100%;
            padding: 15px;
            font-size: 12px;
            font-family: monospace;
            border: 2px solid #2196F3;
            border-radius: 4px;
            margin: 20px 0;
            min-height: 100px;
            box-sizing: border-box;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-size: 14px;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Authentication Token</h2>
        <div id="status" class="status">Extracting token...</div>
        <textarea id="tokenDisplay" readonly></textarea>
        <div>
            <button class="button" onclick="openApp()">Open App</button>
            <button class="button green" onclick="copyToken()">Copy Token</button>
        </div>
        <p style="margin-top: 20px; color: #666; font-size: 14px;">
            If the app doesn't open automatically, copy the token above and paste it in the app.
        </p>
    </div>

    <script>
        // DEBUG: Show what we're working with
        console.log('=== TOKEN EXTRACTION DEBUG ===');
        console.log('Full URL:', window.location.href);
        console.log('Search:', window.location.search);
        console.log('Hash:', window.location.hash);
        
        // Function to extract and display token
        function extractAndDisplayToken() {
            var search = window.location.search;
            var href = window.location.href;
            var token = null;
            var pendingToken = null;
            
            console.log('Extracting from search:', search);
            
            // Show raw URL in textarea first for debugging
            var tokenDisplay = document.getElementById('tokenDisplay');
            var status = document.getElementById('status');
            
            if (!tokenDisplay || !status) {
                console.error('Elements not found! Retrying...');
                setTimeout(extractAndDisplayToken, 100);
                return;
            }
            
            // Show debug info first
            tokenDisplay.value = 'DEBUG:\nFull URL: ' + href + '\n\nSearch: ' + search + '\n\nExtracting...';
            
            // Extract token from URL - MULTIPLE METHODS
            if (search) {
                // Method 1: Simple string split
                var parts = search.substring(1).split('&');
                for (var i = 0; i < parts.length; i++) {
                    var pair = parts[i].split('=');
                    if (pair[0] === 'token' && pair[1]) {
                        token = decodeURIComponent(pair[1]);
                        console.log('✅ Token found via split method, length:', token.length);
                        break;
                    }
                    if (pair[0] === 'pendingToken' && pair[1]) {
                        pendingToken = decodeURIComponent(pair[1]);
                        console.log('✅ PendingToken found via split method');
                    }
                }
                
                // Method 2: Regex (if split didn't work)
                if (!token) {
                    var match = search.match(/[?&]token=([^&]*)/);
                    if (match && match[1]) {
                        token = decodeURIComponent(match[1]);
                        console.log('✅ Token found via regex, length:', token.length);
                    }
                }
                
                // Method 3: URLSearchParams (if others didn't work)
                if (!token && !pendingToken) {
                    try {
                        var params = new URLSearchParams(search);
                        token = params.get('token');
                        pendingToken = params.get('pendingToken');
                        if (token) console.log('✅ Token found via URLSearchParams, length:', token.length);
                    } catch(e) {
                        console.error('URLSearchParams failed:', e);
                    }
                }
            }
            
            // Display result
            if (token) {
                tokenDisplay.value = token;
                status.textContent = '✅ Token loaded! (Length: ' + token.length + ')';
                status.className = 'status success';
                window.currentToken = token;
                
                // Try to open app automatically
                var deepLink = 'mafqoudat://auth/callback?token=' + encodeURIComponent(token);
                setTimeout(function() {
                    window.location.href = deepLink;
                }, 1000);
            } else if (pendingToken) {
                tokenDisplay.value = pendingToken;
                status.textContent = '✅ Pending token loaded!';
                status.className = 'status success';
                window.currentToken = pendingToken;
            } else {
                tokenDisplay.value = 'ERROR: No token found!\n\nFull URL: ' + href + '\n\nSearch params: ' + search + '\n\nPlease check the URL above.';
                status.textContent = '❌ No token found in URL';
                status.className = 'status error';
                console.error('❌ NO TOKEN FOUND! URL:', href, 'Search:', search);
            }
        }
        
        // Run immediately when script loads
        extractAndDisplayToken();
        
        // Also run when DOM is ready (in case elements weren't found)
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', extractAndDisplayToken);
        } else {
            setTimeout(extractAndDisplayToken, 100);
        }
        
        function openApp() {
            var token = window.currentToken || document.getElementById('tokenDisplay').value;
            if (token && !token.includes('ERROR')) {
                var deepLink = 'mafqoudat://auth/callback?token=' + encodeURIComponent(token);
                window.location.href = deepLink;
            } else {
                alert('No token available to open app.');
            }
        }
        
        function copyToken() {
            var tokenDisplay = document.getElementById('tokenDisplay');
            var token = tokenDisplay.value;
            
            if (!token || token.includes('ERROR')) {
                alert('No token available to copy.');
                return;
            }
            
            // Select and copy
            tokenDisplay.select();
            tokenDisplay.setSelectionRange(0, token.length);
            
            try {
                if (document.execCommand('copy')) {
                    alert('Token copied! Return to the app and paste it.');
                    return;
                }
            } catch(e) {
                console.error('execCommand failed:', e);
            }
            
            // Fallback: try clipboard API
            if (navigator.clipboard) {
                navigator.clipboard.writeText(token).then(function() {
                    alert('Token copied! Return to the app and paste it.');
                }).catch(function() {
                    alert('Auto-copy failed. Please manually select and copy the token.');
                });
            } else {
                alert('Auto-copy not available. Please manually select and copy the token.');
            }
        }
    </script>
</body>
</html>
