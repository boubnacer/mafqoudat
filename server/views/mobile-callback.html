<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to App...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            max-width: 90%;
            width: 100%;
        }
        .button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            display: inline-block;
            min-width: 200px;
        }
        .button.green {
            background-color: #4CAF50;
        }
        textarea {
            width: 100%;
            padding: 15px;
            font-size: 12px;
            font-family: monospace;
            border: 2px solid #2196F3;
            border-radius: 4px;
            margin: 20px 0;
            min-height: 100px;
            box-sizing: border-box;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-size: 14px;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Authentication Token</h2>
        <div id="status" class="status">Extracting token...</div>
        <textarea id="tokenDisplay" readonly></textarea>
        <div>
            <button class="button" onclick="openApp()">Open App</button>
            <button class="button green" onclick="copyToken()">Copy Token</button>
        </div>
        <p style="margin-top: 20px; color: #666; font-size: 14px;">
            If the app doesn't open automatically, copy the token above and paste it in the app.
        </p>
    </div>

    <script>
        // Function to display token - check server-injected token first, then URL
        function displayToken() {
            var tokenDisplay = document.getElementById('tokenDisplay');
            var status = document.getElementById('status');
            
            if (!tokenDisplay || !status) {
                setTimeout(displayToken, 50);
                return;
            }
            
            var token = null;
            
            // Method 1: Check server-injected token (most reliable)
            if (window.serverToken) {
                token = window.serverToken;
                console.log('✅ Using server-injected token, length:', token.length);
            }
            
            // Method 2: Extract from URL (fallback)
            if (!token) {
                var search = window.location.search;
                if (search) {
                    // Try simple split first
                    var parts = search.substring(1).split('&');
                    for (var i = 0; i < parts.length; i++) {
                        var pair = parts[i].split('=');
                        if (pair[0] === 'token' && pair[1]) {
                            token = decodeURIComponent(pair[1]);
                            console.log('✅ Token extracted from URL, length:', token.length);
                            break;
                        }
                    }
                }
            }
            
            // Display token
            if (token) {
                tokenDisplay.value = token;
                status.textContent = '✅ Token loaded! (Length: ' + token.length + ')';
                status.className = 'status success';
                window.currentToken = token;
                
                // Try to open app automatically after 1 second
                var deepLink = 'mafqoudat://auth/callback?token=' + encodeURIComponent(token);
                setTimeout(function() {
                    console.log('Attempting to open app with deep link...');
                    window.location.href = deepLink;
                }, 1000);
            } else if (window.serverError) {
                tokenDisplay.value = 'ERROR: ' + window.serverError;
                status.textContent = '❌ Error: ' + window.serverError;
                status.className = 'status error';
            } else {
                tokenDisplay.value = 'ERROR: No token found!\n\nURL: ' + window.location.href + '\n\nSearch: ' + window.location.search;
                status.textContent = '❌ No token found';
                status.className = 'status error';
                console.error('❌ NO TOKEN FOUND!');
            }
        }
        
        // Run immediately
        displayToken();
        
        // Also run when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', displayToken);
        }
        
        function openApp() {
            var token = window.currentToken || document.getElementById('tokenDisplay').value;
            if (token && !token.includes('ERROR')) {
                var deepLink = 'mafqoudat://auth/callback?token=' + encodeURIComponent(token);
                window.location.href = deepLink;
            } else {
                alert('No token available to open app.');
            }
        }
        
        function copyToken() {
            var tokenDisplay = document.getElementById('tokenDisplay');
            var token = tokenDisplay.value;
            
            if (!token || token.includes('ERROR')) {
                alert('No token available to copy.');
                return;
            }
            
            // Select and copy
            tokenDisplay.select();
            tokenDisplay.setSelectionRange(0, token.length);
            
            try {
                if (document.execCommand('copy')) {
                    alert('Token copied! Return to the app and paste it.');
                    return;
                }
            } catch(e) {
                console.error('execCommand failed:', e);
            }
            
            // Fallback: try clipboard API
            if (navigator.clipboard) {
                navigator.clipboard.writeText(token).then(function() {
                    alert('Token copied! Return to the app and paste it.');
                }).catch(function() {
                    alert('Auto-copy failed. Please manually select and copy the token.');
                });
            } else {
                alert('Auto-copy not available. Please manually select and copy the token.');
            }
        }
    </script>
</body>
</html>
