services:
  - type: web
    name: mafqoudat-backend
    env: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # --- Core server config ---
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=400 --expose-gc
      - key: NODE_NO_WARNINGS
        value: "1"
      # PORT is auto-injected by Render, declared here to match the app's default
      - key: PORT
        value: 10000

      # --- Database (MongoDB Atlas) ---
      - key: MONGODB_URI
        sync: false

      # --- Auth / JWT ---
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 30d

      # --- CORS / frontend linkage (Vercel) ---
      - key: FRONTEND_URL
        value: https://mafqoudat.com
      - key: CLIENT_URL
        value: https://mafqoudat.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # --- Google OAuth ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Set to: https://mafqoudat-api.onrender.com/auth/google/callback
      - key: GOOGLE_CALLBACK_URL
        sync: false

      # --- Google Places (city autocomplete) ---
      - key: GOOGLE_PLACES_API_KEY
        sync: false

      # --- GeoNames (city autocomplete) ---
      - key: GEONAMES_USERNAME
        sync: false
      - key: GEONAMES_API_URL
        value: http://api.geonames.org

      # --- Cloudinary (image storage) ---
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # --- Email (Nodemailer / Gmail) ---
      - key: ADMIN_EMAIL
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

      # --- Redis (optional - omit/leave unset to use in-memory cache only) ---
      - key: REDIS_URL
        sync: false

      # --- Misc ---
      - key: MAINTENANCE_MODE
        value: "false"
