services:
  - type: web
    name: mafkoudat-backend
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URI
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRECH_TOKEN_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: mafkoudat-frontend
    env: static
    plan: starter
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/build
    envVars:
      - key: REACT_APP_API_URL
        sync: false 