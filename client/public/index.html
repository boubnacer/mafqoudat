<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Mafkoudat - Find and report lost items" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Cache busting meta tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Mafkoudat</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- logo font -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />

    <!-- fonts for categories -->
    <link href="https://fonts.googleapis.com/css2?family=Signika+Negative:wght@500&display=swap" rel="stylesheet" />

    <!-- fonts for total boxes  -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500&display=swap" rel="stylesheet" />

    <!-- fonts for fl options -->
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee&display=swap" rel="stylesheet" />

    <!-- welcom  -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro&display=swap" rel="stylesheet" />

    <!-- Brand name -->
    <link href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Sofadi+One&display=swap" rel="stylesheet">
    
    <!-- Test script to verify HTML is loading -->
    <script>
      console.log('HTML file loaded successfully');
      console.log('Current URL:', window.location.href);
      console.log('Current pathname:', window.location.pathname);
      
      // Fallback for routing issues
      if (window.location.pathname !== '/' && !window.location.pathname.startsWith('/static/')) {
        console.log('Potential routing issue detected, checking if React app loaded...');
        setTimeout(() => {
          if (!document.getElementById('root').children.length) {
            console.log('React app not loaded, redirecting to home...');
            window.location.href = '/';
          }
        }, 1000);
      }
    </script>
  </head>
  <body dir="auto">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
